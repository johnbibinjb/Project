<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Shortlister</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-accent: #6366f1;
            --grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }

        /* Light Mode Colors */
        [data-bs-theme="light"] {
            --bg-color: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #1e293b;
            --border-color: #e2e8f0;
        }

        /* Dark Mode Colors */
        [data-bs-theme="dark"] {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f1f5f9;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            transition: background-color 0.3s ease;
            display: flex;
            align-items: center;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 2rem;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        /* Theme Switcher Toggle */
        .theme-switch-wrapper {
            position: absolute;
            top: 2rem;
            right: 2rem;
            display: flex;
            align-items: center;
        }

        .form-check-input:checked {
            background-color: var(--primary-accent);
            border-color: var(--primary-accent);
        }

        .brand-title {
            font-weight: 800;
            background: var(--grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-primary {
            background: var(--grad);
            border: none;
            font-weight: 700;
            border-radius: 12px;
            padding: 12px;
            transition: transform 0.2s;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px;
            background-color: transparent;
            color: inherit;
        }
    </style>
</head>
<body>

<div class="theme-switch-wrapper">
    <label class="form-check-label me-2" for="themeToggle">🌓 Mode</label>
    <div class="form-check form-switch">
        <input class="form-check-input" type="checkbox" id="themeToggle" checked>
    </div>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="glass-card">
                <div class="text-center mb-4">
                    <h1 class="brand-title">Shortlist.AI</h1>
                    <p class="opacity-75">Lets Evaluate People !</p>
                </div>

                <form action="/process" method="post" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Job Requirements</label>
                        <textarea name="requirements" class="form-control" rows="6" required
                                  placeholder="What skills are you looking for?"></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Upload ZIP</label>
                        <input type="file" name="resumes_zip" accept=".zip" class="form-control" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Start AI Shortlisting</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const toggle = document.getElementById('themeToggle');
    const html = document.documentElement;

    toggle.addEventListener('change', () => {
        if (toggle.checked) {
            html.setAttribute('data-bs-theme', 'dark');
        } else {
            html.setAttribute('data-bs-theme', 'light');
        }
    });
</script>

</body>
</html>
